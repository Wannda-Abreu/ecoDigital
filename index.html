<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.svg" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dsyfal3wa/image/upload/f_auto,q_auto:eco,c_limit,w_1280/v1776029793/ChatGPT_Image_12_abr_2026_23_36_06_xgkuyy.png"

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecomercia</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function restoreGithubPagesRoute() {
        const params = new URLSearchParams(window.location.search);
        const route = params.get("route");

        if (!route) {
          return;
        }

        const basePath = "/ecoDigital";
        const nextPath = route === "/" ? "/" : route;
        const nextUrl = `${basePath}${nextPath}${window.location.hash}`;

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
